services:
  db:
    image: postgres:16-alpine
    container_name: bolonobrasil-db
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - app_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: bolonobrasil-web
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - /home/phablo_augusto/app/storage:/app/storage
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: bolonobrasil-worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /home/phablo_augusto/app/storage:/app/storage

volumes:
  app_pgdata:

